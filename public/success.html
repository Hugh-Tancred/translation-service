<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment received – Trans-editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Source Sans 3', -apple-system, sans-serif;
      background-color: #faf8f5;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #ffffff;
      border: 1px solid #e0dcd5;
      border-radius: 12px;
      padding: 3rem 2.5rem;
      max-width: 520px;
      width: 100%;
      text-align: center;
    }

    .tick { font-size: 3rem; margin-bottom: 1.25rem; color: #2c5530; }

    h1 {
      font-family: 'Libre Baskerville', Georgia, serif;
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 1rem;
    }

    p { color: #4a4a4a; line-height: 1.65; margin-bottom: 0.85rem; font-size: 1rem; }

    .note {
      margin-top: 1.75rem;
      padding: 1.25rem;
      background: #f0f4f1;
      border-radius: 8px;
      font-size: 0.9rem;
      color: #3a5c3e;
      line-height: 1.6;
    }

    .download-btn {
      display: inline-block;
      margin-top: 1.75rem;
      padding: 0.85rem 2rem;
      background-color: #2c5530;
      color: #ffffff;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      border-radius: 6px;
    }

    .download-btn:hover { background-color: #224228; }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid #ccc;
      border-top-color: #2c5530;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .back-link {
      display: inline-block;
      margin-top: 2rem;
      color: #2c5530;
      font-weight: 600;
      text-decoration: none;
      font-size: 0.95rem;
      border-bottom: 1px solid #2c5530;
      padding-bottom: 1px;
    }

    .back-link:hover { opacity: 0.75; }

    #status-msg { margin-top: 1rem; color: #6a6a6a; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="tick">✓</div>
    <h1>Payment received</h1>
    <p>Thank you. Your translation is being processed.</p>

    <div id="download-area">
      <p id="status-msg"><span class="spinner"></span>Preparing your document…</p>
    </div>

    <div class="note">
      Your document will be automatically deleted from our servers within 48 hours.
    </div>

    <a href="/" class="back-link">Translate another document</a>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get('session_id');
    const orderId = params.get('order_id');
    let attempts = 0;
    const MAX_ATTEMPTS = 48; // 4 minutes at 5s intervals

    async function pollForDownload() {
      if (!sessionId && !orderId) {
        document.getElementById('status-msg').textContent =
          'If you provided an email address, your document will be sent there shortly.';
        return;
      }

      try {
        const url = orderId
          ? `/api/status/${orderId}`
          : `/api/status/session/${sessionId}`;
        const res = await fetch(url);
        if (!res.ok) throw new Error('Status check failed');
        const data = await res.json();
        console.log('Poll response:', JSON.stringify(data));

        if (data.status === 'delivered' && data.downloadUrl) {
          const area = document.getElementById('download-area');
          area.innerHTML = `
            <a href="${data.downloadUrl}"
               download="${data.filename || 'translated_document'}"
               class="download-btn">
              Download your translation
            </a>
            <p style="margin-top:1rem;font-size:0.85rem;color:#6a6a6a;">This link expires in 48 hours.</p>
          `;
          return;
        }

        attempts++;
        if (attempts >= MAX_ATTEMPTS) {
          document.getElementById('status-msg').textContent =
            'This is taking longer than usual. If you provided an email address, your document will be sent there. Otherwise please contact us.';
          return;
        }

        setTimeout(pollForDownload, 5000);

      } catch (err) {
        attempts++;
        if (attempts < MAX_ATTEMPTS) setTimeout(pollForDownload, 5000);
      }
    }

    pollForDownload();
  </script>
</body>
</html>
